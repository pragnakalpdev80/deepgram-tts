<!DOCTYPE html>
<html>
  <head>
    <title>Text to Speech - Select Model</title>
  </head>
  <body>
    <h1>TTS With Django</h1>
    <form method="POST" action="/">
      {% csrf_token %}
      <label for="model">Select Model:</label>
      <select name="model" id="model">
        {% for m in models %}
          <option value="{{ m.id }}">{{ m.tool.name }} - {{ m.name }}</option>
        {% empty %}
          <option disabled>No models available</option>
        {% endfor %}
      </select>
      <br><br>
      <button type="submit">Connect</button>
    </form>
  </body>
</html>
