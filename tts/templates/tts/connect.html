<!DOCTYPE html>
<html>
  <head>
    <title>Text to Speech Implementation</title>
  </head>
  <body>
    <form method="POST">
    {% csrf_token %}
    <h1>TTS With Django</h1>
    <button type="submit">Register</button>
    </form>
    {% if messages %}
        {% for message in messages %}
            {{ message }}
        {% endfor %}
    {% endif %}
  </body>
</html>
